<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAS Playground — Virtual Assembler Online</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a4a;
      display: fleg;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #7ec8e3;
      letter-spacing: 0.5px;
    }
    header h1 span { color: #8888bb; font-weight: 400; }
    header .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls label { font-size: 0.85rem; color: #aab; }
    .controls select, .controls button {
      background: #252540;
      color: #ddd;
      border: 1px solid #3a3a5a;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .controls select:hover, .controls button:hover { background: #30305a; border-color: #5a5a8a; }
    .controls button.primary {
      background: #2a5a7a;
      border-color: #3a8aba;
      color: #fff;
      font-weight: 600;
    }
    .controls button.primary:hover { background: #3a7aaa; }
    .copy-btn { background: none; border: 1px solid #3a3a5a; color: #889; cursor: pointer; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; transition: all 0.15s; line-height: 1.4; }
    .copy-btn:hover { background: #2a2a4a; color: #dde; }
    .copy-btn.copied { background: #2a5a3a; border-color: #4a8a5a; color: #8f8; }

    main {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }
    @media (max-width: 800px) {
      main { flex-direction: column; }
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel + .panel { border-left: 1px solid #2a2a4a; }
    @media (max-width: 800px) {
      .panel + .panel { border-left: none; border-top: 1px solid #2a2a4a; }
    }

    .panel-header {
      padding: 8px 16px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 0.8rem;
      color: #8899bb;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-header .badge {
      font-size: 0.7rem;
      background: #2a2a4a;
      padding: 2px 8px;
      border-radius: 10px;
      color: #99b;
    }

    textarea {
      flex: 1;
      background: #0a0a18;
      color: #c9d1d9;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      tab-size: 2;
    }
    textarea::placeholder { color: #445; }

    /* VAS input with highlight overlay */
    .input-wrap { position: relative; flex: 1; display: flex; }
    .input-wrap .gutter {
      width: 48px; flex-shrink: 0;
      padding: 12px 0; text-align: right;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 13px; line-height: 1.5;
      color: #445; user-select: none; overflow: hidden;
      background: #08081a; z-index: 3; position: relative;
    }
    .input-wrap .gutter span { display: block; padding-right: 8px; }
    .input-wrap .gutter .active { color: #667; }
    .input-wrap textarea, .input-wrap .highlight-overlay {
      position: absolute; top: 0; left: 48px; right: 0; height: 100%;
      padding: 12px; border: none; outline: none;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 13px; line-height: 1.5; tab-size: 4;
      white-space: pre; overflow-wrap: normal; overflow: auto;
      resize: none;
    }
    .input-wrap textarea {
      background: transparent; color: transparent; caret-color: #e0e0ee;
      z-index: 2;
    }
    .input-wrap textarea:focus { background: transparent; }
    .input-wrap .highlight-overlay {
      background: #0a0a18; color: #e0e0ee; z-index: 1;
      pointer-events: none;
    }
    .vas-cmt { color: #5a7a5a; }
    .vas-keyword { color: #7ec8e3; font-weight: bold; }
    .vas-reg { color: #c8a87a; }
    .vas-number { color: #8ac; }
    .vas-label { color: #d0d0e0; font-weight: bold; }
    .vas-directive { color: #b8a0d8; }

    .output-area {
      flex: 1;
      background: #0a0a18;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .output-area .error { color: #f55; }
    .output-area .info { color: #888; }
    .output-area .timestamp { color: #556; font-size: 0.75rem; }
    .output-area .asm-cmt { color: #5a7a5a; }
    .output-area .asm-keyword { color: #7ec8e3; font-weight: bold; }
    .output-area .asm-reg { color: #c8a87a; }
    .output-area .asm-number { color: #8ac; }
    .output-area .asm-label { color: #d0d0e0; font-weight: bold; }
    .output-area .asm-directive { color: #b8a0d8; }
    .output-area .asm-string { color: #9b9; }

    .status-bar {
      background: #12122a;
      border-top: 1px solid #2a2a4a;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: #667;
      display: flex;
      gap: 20px;
    }
    .status-bar .ok { color: #5b5; }
    .status-bar .err { color: #f55; }

    .examples-bar {
      background: #14142a;
      border-top: 1px solid #2a2a4a;
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .examples-bar span { font-size: 0.8rem; color: #667; }
    .examples-bar button {
      background: #1e1e3a;
      color: #aab;
      border: 1px solid #2a2a4a;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .examples-bar button:hover { background: #2e2e5a; color: #dde; }

    /* spinner */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #334;
      border-top-color: #7ec8e3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { color: #aac; font-size: 1rem; }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
<p>Loading VAS WebAssembly engine...</p>
</div>

<header>
  <h1>VAS <span>Playground</span></h1>
  <div class="controls">
<label>Target
      <select id="target">
        <option value="elf64">Linux (elf64)</option>
        <option value="win64">Windows (win64)</option>
      </select>
    </label>
<label>Optimization
      <select id="opt">
        <option value="0">O0 (none)</option>
        <option value="1">O1 (const fold, DCE, peephole)</option>
        <option value="2">O2 (+ CSE, LICM, tail call, …)</option>
      </select>
    </label>
<button class="primary" id="runBtn" disabled onclick="run()">▶ Assemble</button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-header">
<span>VAS Source</span>
<span class="badge" id="inputLines">0 lines</span>
<button class="copy-btn" onclick="copySource()" title="Copy VAS source">Copy</button>
    </div>
    <div class="input-wrap">
      <div class="gutter" id="gutter"></div>
      <div class="highlight-overlay" id="vasHighlight"></div>
      <textarea id="input" placeholder="; Enter VAS code here&#10;MOVI v0, 60&#10;SYSCALL">; A simple VAS program
; Equivalent to sys_exit(0)

SECTION .text
GLOBAL _start

_start:
  MOVI  v0, 60       ; sys_exit number
  MOVI  v1, 0        ; return value 0
  SYSCALL</textarea>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
<span>Generated x86-64 Assembly</span>
<span class="badge" id="modeLabel">standalone</span>
<button class="copy-btn" onclick="copyOutput()" title="Copy assembly output">Copy</button>
    </div>
    <div class="output-area" id="output">
<span class="info">; Click &quot;▶ Assemble&quot; to start</span>
    </div>
  </div>
</main>

<div class="examples-bar">
<span>Examples:</span>
  <button onclick="loadExample('hello')">Hello World</button>
<button onclick="loadExample('fib')">Fibonacci</button>
<button onclick="loadExample('fact')">Factorial</button>
<button onclick="loadExample('calc')">Calculator</button>
<button onclick="loadExample('sort')">Sort</button>
<button onclick="loadExample('win-edge')">Windows GUI</button>
<button onclick="loadExample('opt_showcase')">-O2 Showcase</button>
</div>

<div class="status-bar">
<span>Status: <span id="status" class="ok">Ready</span></span>
  <span id="stats"></span>
</div>

<script src="wasm_exec.js"></script>
<script>
// ── WASM Bootstrap ──
const loading = document.getElementById('loading');
const runBtn = document.getElementById('runBtn');
const statusEl = document.getElementById('status');

let go;
let inst;

async function bootstrap() {
  loading.classList.add('active');
  console.log('[VAS] bootstrap start');
  try {
    console.log('[VAS] creating Go()');
    go = new Go();
    console.log('[VAS] fetching vas.wasm ...');
    const resp = await fetch('vas.wasm');
    console.log('[VAS] fetch OK, status:', resp.status, 'size:', resp.headers.get('Content-Length'), 'type:', resp.headers.get('Content-Type'));

    // Use arrayBuffer + instantiate instead of instantiateStreaming (more reliable MIME handling)
    console.log('[VAS] reading arrayBuffer ...');
    const bytes = await resp.arrayBuffer();
    console.log('[VAS] arrayBuffer OK, bytes:', bytes.byteLength);

    console.log('[VAS] WebAssembly.instantiate ...');
    const result = await WebAssembly.instantiate(bytes, go.importObject);
    console.log('[VAS] instantiate OK');

    inst = result.instance;
    console.log('[VAS] calling go.run(inst) (non-blocking) ...');
    go.run(inst).then(() => {
      console.log('[VAS] go.run resolved (engine exited)');
    }).catch(e => {
      console.error('[VAS] go.run error:', e);
      statusEl.textContent = 'Engine error: ' + e.message;
    });

    // These run immediately — WASM is ready for JS calls
    runBtn.disabled = false;
    statusEl.textContent = 'VAS engine loaded';
    loading.classList.remove('active');
    console.log('[VAS] bootstrap complete, UI unlocked');
  } catch (e) {
    console.error('[VAS] bootstrap failed:', e.message, e.stack);
    statusEl.textContent = 'Load failed: ' + e.message;
    statusEl.className = 'err';
loading.querySelector('p').textContent = 'Load failed: ' + e.message;
  }
}
bootstrap();

// ── Core assemble function ──
function run() {
  const input = document.getElementById('input').value;
  const target = document.getElementById('target').value;
  const opt = parseInt(document.getElementById('opt').value);
  const output = document.getElementById('output');
  const statsEl = document.getElementById('stats');
  const modeLabel = document.getElementById('modeLabel');

  if (!input.trim()) {
output.innerHTML = '<span class="error">Error: enter VAS code</span>';
    return;
  }

  try {
    let result;
    const standalone = typeof vasAssembleStandalone === 'function';
    if (standalone) {
      result = vasAssembleStandalone(input, target, opt);
    } else {
      // fallback
result = { error: 'WASM function not ready' };
    }

    if (result.error) {
      output.innerHTML = '<span class="error">' + escapeHtml(result.error) + '</span>';
      statusEl.textContent = 'Error';
      statusEl.className = 'err';
      statsEl.textContent = '';
      return;
    }

    const outText = result.output || '';
    output.innerHTML = '<span class="timestamp">; Generated at ' + new Date().toLocaleTimeString() + '</span>\n' + highlightAsm(outText);
    statusEl.textContent = 'OK';
    statusEl.className = 'ok';
modeLabel.textContent = standalone ? 'standalone' : '';

    // stats
    const lines = outText.split('\n').length;
    const instrs = outText.split('\n').filter(l => l.trim() && !l.trim().startsWith(';') && !l.trim().startsWith('.')).length;
statsEl.textContent = lines + ' lines / ' + instrs + ' instructions';
  } catch (e) {
    output.innerHTML = '<span class="error">' + escapeHtml(String(e)) + '</span>';
    statusEl.textContent = 'Exception';
    statusEl.className = 'err';
  }
}

// ── Syntax highlighting for NASM output ──
function highlightAsm(text) {
  // Escape HTML first, then apply colored spans
  let s = escapeHtml(text);
  // Comments (; ...)
  s = s.replace(/(;.*$)/gm, '<span class="asm-cmt">$1</span>');
  // Labels (identifier followed by colon)
  s = s.replace(/^(\s*)([a-z_][a-z0-9_]*):/gim, '$1<span class="asm-label">$2:</span>');
  // Directives (section, global, extern, default)
  s = s.replace(/\b(section|global|extern|default|align|bits|org)\b/gi, '<span class="asm-directive">$1</span>');
  // x86-64 registers (rax, rbx, ..., r15, eax, ebx, ..., xmm0-15)
  s = s.replace(/\b([re]?[abcd]x|[re]?[sb]p|[re]?[sd]i|[re]?[bcd]?sp|r[89]|r1[0-5]|[abcd]h|[abcd]l|xmm\d{1,2}|ymm\d{1,2}|zmm\d{1,2})\b/gi, '<span class="asm-reg">$1</span>');
  // v-registers (v0-v12)
  s = s.replace(/\b(v\d{1,2})\b/g, '<span class="asm-reg">$1</span>');
  // Numbers (hex and decimal)
  s = s.replace(/\b(0x[0-9a-fA-F]+|\d+)\b/g, '<span class="asm-number">$1</span>');
  // Instructions (common x86-64 mnemonics)
  s = s.replace(/\b(mov|add|sub|imul|mul|div|idiv|lea|shl|shr|sar|xor|and|or|not|neg|inc|dec|push|pop|call|ret|jmp|je|jne|jg|jl|jge|jle|ja|jb|jae|jbe|jo|jno|js|jns|cmp|test|syscall|int|nop|rep|repne|lock|xchg|cmov[abgleno]{1,2}|set[abgleno]{1,2}|popcnt|bsf|bsr|tzcnt|lzcnt|bswap)\b/gi, '<span class="asm-keyword">$1</span>');
  return s;
}

// ── Line counter + VAS highlighting + gutter ──
document.getElementById('input').addEventListener('input', function() {
  const lines = this.value.split('\n').length;
document.getElementById('inputLines').textContent = lines + ' lines';
  updateGutter();
  highlightVAS();
});

// ── Gutter (line numbers) ──
function updateGutter() {
  const input = document.getElementById('input');
  const gutter = document.getElementById('gutter');
  const lines = input.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) {
    html += '<span>' + i + '</span>';
  }
  gutter.innerHTML = html;
  gutter.scrollTop = input.scrollTop;
}
document.getElementById('input').addEventListener('scroll', function() {
  document.getElementById('gutter').scrollTop = this.scrollTop;
  document.getElementById('vasHighlight').scrollTop = this.scrollTop;
  document.getElementById('vasHighlight').scrollLeft = this.scrollLeft;
});

// ── VAS syntax highlighting ──
function highlightVAS() {
  const input = document.getElementById('input');
  const overlay = document.getElementById('vasHighlight');
  let s = escapeHtml(input.value);
  // Comments
  s = s.replace(/([;#].*$)/gm, '<span class="vas-cmt">$1</span>');
  // Labels (line start, identifier followed by colon)
  s = s.replace(/^(\s*)([a-z_][a-z0-9_]*):/gim, '$1<span class="vas-label">$2:</span>');
  // Directives
  s = s.replace(/\b(section|global|extern|data|text|bss|align|db|dw|dd|dq|dw|resb|resw|resd|resq|equ|times|incbin)\b/gi, '<span class="vas-directive">$1</span>');
  // VAS instructions
  s = s.replace(/\b(ADD|SUB|MUL|LOAD|STORE|LEA|MOVI|MOV|CMP|JMP|JE|JNE|JG|JL|JGE|JLE|CALL|RET|NOP|PUSH|POP|SYSCALL|INT|SHL|SHR|AND|OR|XOR|NOT|NEG|INC|DEC)\b/g, '<span class="vas-keyword">$1</span>');
  // v-registers
  s = s.replace(/\b(v\d{1,2})\b/g, '<span class="vas-reg">$1</span>');
  // Numbers
  s = s.replace(/\b(0x[0-9a-fA-F]+|\d+)\b/g, '<span class="vas-number">$1</span>');
  overlay.innerHTML = s + '\n';
  // Sync scroll
  overlay.scrollTop = input.scrollTop;
  overlay.scrollLeft = input.scrollLeft;
}
// Sync scroll on scroll
document.getElementById('input').addEventListener('scroll', function() {
  document.getElementById('vasHighlight').scrollTop = this.scrollTop;
  document.getElementById('vasHighlight').scrollLeft = this.scrollLeft;
});

// ── Examples ──
const EXAMPLES = {};

function loadExample(name) {
  const area = document.getElementById('input');
  if (EXAMPLES[name]) {
    area.value = EXAMPLES[name];
    area.dispatchEvent(new Event('input'));
    // auto-run
    run();
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Fetch examples from server ──
async function loadExamples() {
  const names = ['hello', 'fib', 'fact', 'calc', 'sort', 'win-edge', 'opt_showcase'];
  for (const name of names) {
    try {
      const resp = await fetch('examples/' + name + '.vas');
      if (resp.ok) {
        EXAMPLES[name] = await resp.text();
      }
    } catch(_) {}
  }
}
loadExamples();

// Initial highlight + gutter
highlightVAS();
updateGutter();

// Keyboard shortcut: Ctrl+Enter to assemble
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
});

// ── Copy buttons ──
function copySource() {
  const text = document.getElementById('input').value;
  copyToClipboard(text, 'copySource');
}
function copyOutput() {
  const el = document.getElementById('output');
  const text = el.textContent || el.innerText;
  copyToClipboard(text, 'copyOutput');
}
function copyToClipboard(text, btnId) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(`[onclick="${btnId}()"]`);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
</script>
</body>
</html>
