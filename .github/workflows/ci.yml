# Run tests on every push and pull request
name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'wasm/**'
      - '**.md'
      - 'syntaxes/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['stable', 'oldstable']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Normalize line endings (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          find . -type f \( -name '*.go' -o -name '*.golden' -o -name '*.vas' -o -name '*.yml' -o -name '*.md' \) -exec sed -i 's/\r$//' {} +

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install NASM (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/win64/nasm-2.16.03-win64.zip"
          $zip = "$env:TEMP\nasm.zip"
          $extract = "$env:TEMP\nasm"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $bin = "$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Path $bin -Force | Out-Null
          Copy-Item "$extract\nasm-2.16.03\nasm.exe" "$bin\" -Force
          echo "$bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify NASM
        run: nasm --version

      - name: Build
        run: go build ./...

      - name: Short test
        run: go test -short ./...

      - name: Full test (incl. E2E with nasm + ld)
        if: runner.os == 'Linux'
        run: go test ./...

      - name: Full test (incl. nasm, skip ELF runtime)
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
