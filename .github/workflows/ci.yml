# Run tests on every push and pull request
name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'wasm/**'
      - '**.md'
      - 'syntaxes/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.21', '1.22']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install NASM (Linux, needed for full E2E test)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Verify NASM
        if: runner.os == 'Linux'
        run: nasm --version

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -short ./...

      - name: Full test with E2E (Linux only)
        if: runner.os == 'Linux'
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
