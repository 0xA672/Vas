# Run tests on every push and pull request
name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'wasm/**'
      - '**.md'
      - 'syntaxes/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.21', '1.22']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install NASM (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -sL https://github.com/netwide-assembler/nasm/releases/download/nasm-2.16.03/nasm-2.16.03-win64.zip -o nasm.zip
          7z x nasm.zip -onasm_tmp > $null
          mkdir $env:USERPROFILE\.local\bin -Force | Out-Null
          copy nasm_tmp\nasm-2.16.03\nasm.exe $env:USERPROFILE\.local\bin\
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify NASM
        run: nasm --version

      - name: Build
        run: go build ./...

      - name: Short test
        run: go test -short ./...

      - name: Full test (incl. E2E with nasm + ld)
        if: runner.os == 'Linux'
        run: go test ./...

      - name: Full test (incl. nasm, skip ELF runtime)
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
