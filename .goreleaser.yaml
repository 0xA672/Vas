# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  # ── Native CLI builds ────────────────────────────────────────────────
  - id: vas-cli
    main: .
    binary: vas
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64      # arm64 Windows not a primary target yet
    ldflags:
      - "-s -w -X main.Version={{ .Version }}"
    env:
      - CGO_ENABLED=0

  # ── WebAssembly build (for the playground) ───────────────────────────
  - id: vas-wasm
    main: ./wasm/wasm.go
    binary: vas
    goos:
      - js
    goarch:
      - wasm
    ldflags:
      - "-s -w -X main.Version={{ .Version }}"
    env:
      - CGO_ENABLED=0

archives:
  - id: vas-archive
    builds:
      - vas-cli
    name_template: "vas_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

  - id: vas-wasm-archive
    builds:
      - vas-wasm
    name_template: "vas_wasm_{{ .Version }}"
    formats:
      - tar.gz
    files:
      - wasm/wasm_exec.js
      - wasm/index.html

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore'
      - 'Merge pull request'
      - 'Merge branch'

release:
  prerelease: auto
  footer: |
    **Thank you!** Feedback and contributions are always welcome.